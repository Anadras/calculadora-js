<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Calculadora</title>
  </head>
  <body>
    <div class="grid-container">
      <div class="output">
        <div class="previous-operand" data-previous-operand>123</div>
        <div class="current-operand" data-current-operand>456</div>
      </div>
      <button class="span-two" data-all-clear>AC</button>
      <button data-delete>DEL</button>
      <button class="operator" data-operation>÷</button>
      <button data-number>1</button>
      <button data-number>2</button>
      <button data-number>3</button>
      <button class="operator" data-operation>*</button>
      <button data-number>4</button>
      <button data-number>5</button>
      <button data-number>6</button>
      <button class="operator" data-operation>+</button>
      <button data-number>7</button>
      <button data-number>8</button>
      <button data-number>9</button>
      <button class="operator" data-operation>-</button>
      <button class="span-two" data-number>.</button>
      <button data-number>0</button>
      <button class="operator" data-equals>=</button>
    </div>

    <script src="./scripts.js"></script>
  </body>
</html>
